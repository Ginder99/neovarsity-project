spring:
  application:
    name: auth-service
    jpa:
      hibernate:
        ddl-auto: validate
      show-sql: false
  datasource:
    url: jdbc:mysql://localhost:3306/vms_db
    username: ${DB_USER:application_user}
    password: ${DB_PASSWORD:App_user_pwd}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
    port: 9001

jwt:
    secret: ${JWT_SECRET:this-is-a-big-secret-key-for-jwt-token-generation}
    expiration-ms: 3600000

refresh-token:
  expiration: 604800000

password-reset-token:
  expiration: 3600

logging:
    level:
        com.vms.auth: ERROR
        org.springframework.web: ERROR
